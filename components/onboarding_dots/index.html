<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; }
body { margin: 0; background: transparent; text-align: center; padding: 6px 0; }
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  display: inline-block;
  margin: 0 5px;
  background: #D1D5DB;
  cursor: pointer;
  transition: background 0.2s;
}
.dot.active { background: #2563EB; }
</style>
</head>
<body>
<div id="dots"></div>
<script>
(function () {
  var total = 4;
  var currentStep = 0;

  function post(type, extra) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, extra), "*");
  }

  function render() {
    var container = document.getElementById("dots");
    container.innerHTML = "";
    for (var i = 0; i < total; i++) {
      var dot = document.createElement("span");
      dot.className = "dot" + (i === currentStep ? " active" : "");
      dot.onclick = (function (idx) {
        return function () {
          post("streamlit:setComponentValue", { value: { step: idx }, dataType: "json" });
        };
      })(i);
      container.appendChild(dot);
    }
  }

  window.addEventListener("message", function (e) {
    if (e.data && e.data.type === "streamlit:render" && e.data.args) {
      var args = e.data.args;
      if (args.current_step !== undefined) currentStep = parseInt(args.current_step);
      if (args.total !== undefined) total = parseInt(args.total);
      render();
    }
  });

  post("streamlit:componentReady", { apiVersion: 1 });
  post("streamlit:setFrameHeight", { height: 28 });
  render();
})();
</script>
</body>
</html>
